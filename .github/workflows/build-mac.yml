name: Build Electron App for macOS

on:
  push:
    branches:
      - main # Hoặc master tùy theo nhánh chính của bạn
  workflow_dispatch: # Cho phép bạn bấm nút build thủ công trên web GitHub

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Thay bằng phiên bản Node bạn đang dùng

      - name: Install dependencies
        run: npm install # Hoặc yarn install / pnpm install

      - name: Build Electron App
        run: npx electron-builder --mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Build
          path: dist/*.dmg # Hoặc dist/*.zip tùy cấu hình output của bạn